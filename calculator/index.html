<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calc">
    <div class="display">
      <div id="expr"></div>
      <div id="result">0</div>
    </div>
    <div class="buttons">
      <button class="span2" data-action="clear">AC</button>
      <button data-action="sign">+/−</button>
      <button data-action="percent">%</button>
      <button class="op" data-value="/">÷</button>
      <button data-value="7">7</button><button data-value="8">8</button><button data-value="9">9</button>
      <button class="op" data-value="*">×</button>
      <button data-value="4">4</button><button data-value="5">5</button><button data-value="6">6</button>
      <button class="op" data-value="-">−</button>
      <button data-value="1">1</button><button data-value="2">2</button><button data-value="3">3</button>
      <button class="op" data-value="+">+</button>
      <button class="span2" data-value="0">0</button>
      <button data-value=".">.</button>
      <button class="op equals" data-action="equals">=</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
